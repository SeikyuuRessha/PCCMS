name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== Backend ====================
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Generate application.properties from secrets
        run: |
          cat > src/main/resources/application.properties << 'PROPS'
          spring.application.name=code-trials
          server.port=8080
          spring.datasource.url=${{ secrets.DB_URL }}
          spring.datasource.username=${{ secrets.DB_USERNAME }}
          spring.datasource.password=${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
          spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
          spring.jpa.hibernate.ddl-auto=validate
          spring.jpa.show-sql=false
          jwt.secret=${{ secrets.JWT_SECRET }}
          jwt.expiration=600000
          jwt.refresh-expiration=604800000
          security.pepper=${{ secrets.SECURITY_PEPPER }}
          app.cors.allowed-origins=${{ secrets.CORS_ALLOWED_ORIGINS }}
          spring.data.redis.host=${{ secrets.REDIS_HOST }}
          spring.data.redis.port=${{ secrets.REDIS_PORT }}
          spring.data.redis.password=${{ secrets.REDIS_PASSWORD }}
          spring.data.redis.ssl.enabled=${{ secrets.REDIS_SSL_ENABLED }}
          management.endpoints.web.exposure.include=health,info,metrics
          management.endpoint.health.show-details=when_authorized
          management.health.mail.enabled=false
          logging.level.root=INFO
          logging.level.com.example=INFO
          spring.mail.host=smtp.gmail.com
          spring.mail.port=587
          spring.mail.username=${{ secrets.MAIL_USERNAME }}
          spring.mail.password=${{ secrets.MAIL_PASSWORD }}
          spring.mail.properties.mail.smtp.auth=true
          spring.mail.properties.mail.smtp.starttls.enable=true
          spring.mail.properties.mail.smtp.starttls.required=true
          aws.s3.bucket=${{ secrets.AWS_S3_BUCKET }}
          aws.s3.region=${{ secrets.AWS_S3_REGION }}
          aws.accessKeyId=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws.secretKey=${{ secrets.AWS_SECRET_KEY }}
          judge0.base-url=${{ secrets.JUDGE0_BASE_URL }}
          judge0.auth-token=${{ secrets.JUDGE0_AUTH_TOKEN }}
          judge0.callback-url=${{ secrets.JUDGE0_CALLBACK_URL }}
          judge0.retry.max-attempts=3
          judge0.retry.initial-delay-ms=2000
          judge0.retry.multiplier=2.0
          judge0.rate-limit.max-concurrent=10
          judge0.rate-limit.queue-timeout-ms=30000
          PROPS

      - name: Build with Maven
        run: ./mvnw clean compile -q

  # ==================== Frontend ====================
  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Create .env
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
